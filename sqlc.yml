version: "2"

sql:
  - engine: "postgresql"
    queries: "internal/user/sql/query.sql"
    schema:  "migrations"
    gen:
      go:
        package:                "repository"
        out:                    "internal/user/repository"
        sql_package:            "pgx/v5"
        emit_json_tags:         true
        emit_db_tags:           true
        emit_empty_slices:      true
        emit_prepared_queries:  true
        omit_unused_structs:    true

  - engine: "postgresql"
    queries: "internal/org/sql/query.sql"
    schema:  "migrations"
    gen:
      go:
        package:                "repository"
        out:                    "internal/org/repository"
        sql_package:            "pgx/v5"
        emit_json_tags:         true
        emit_db_tags:           true
        emit_empty_slices:      true
        emit_prepared_queries:  true
        omit_unused_structs:    true
