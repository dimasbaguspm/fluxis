services:
  app:
    build:
      context: ..
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - ..:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://fluxis:fluxis@postgres:5432/fluxis?sslmode=disable
      - REDIS_URL=redis://redis:6379

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: fluxis
      POSTGRES_PASSWORD: fluxis
      POSTGRES_DB: fluxis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  go_cache:
